# About Section
about_title: About Me
about_profile_image: images/profile.jpg
about_content: |
  Computer Science undergraduate at LUMS with hands-on experience in AI, Machine Learning, and software development. Experienced Teaching Assistant for AI/ML courses, skilled in mentoring, collaborative problem-solving, and project management, with a strong commitment to continual learning and innovation.

content:
  - title: Projects
    layout: list
    content:
      - layout: top-middle
        title: "Mindbloom: AI-Powered Study Productivity Platform"
        sub_title: Senior Project, LUMS
        description: |
          Built a multi-platform intelligent study assistant across web, mobile, and Chrome extension using a Node.js/Express backend with Firebase-based authentication and real-time data handling.

          Developed key features including focus tracking and session logging, AI-powered flashcard generation from PDFs, interactive analytics dashboards, goal tracking, calendar integration, and gamified reward systems.

          Designed and implemented a machine learning-driven recommendation engine that analyzes user behavior patterns including focus duration, distractions, and temporal trends to deliver personalized study strategies.

          Engineered a scalable and secure API architecture, and conducted end-to-end testing using Playwright to ensure system reliability and cross-platform consistency.

      - layout: top-middle
        title: EduLink – Student-Tutor Web Platform
        description: |
          Developed a full-stack web platform that connects students with tutors for online learning, enabling course browsing, enrollment, and interaction, using React, Node.js, and Express.js.

          Designed and managed the database using Oracle Database, implementing structured schemas for users, courses, and enrollments, along with secure authentication and role-based access control.

          Performed end-to-end testing using Cypress, deployed via Vercel, managed version control with Git, and configured backend services on a virtual machine.

      - layout: top-middle
        title: Generative AI Development of LLaMA
        description: |
          Built a transformer-based generative language model inspired by LLaMA, implementing attention mechanisms and training pipelines for context-aware text generation.

      - layout: top-middle
        title: Conversational PDF Assistant
        description: |
          Developed an AI-powered assistant enabling users to upload PDFs and query document content, using transformer-based models for context-aware question answering.

          Implemented text extraction, chunking, and retrieval pipelines, optimized responses via prompt engineering, and integrated backend APIs for efficient data processing.

      - layout: top-middle
        title: Diagnosis Chat Bot
        description: |
          Developed an AI-powered chatbot that analyzes user-reported symptoms and provides preliminary health insights using rule-based logic and machine learning techniques.

          Performed data scraping and preprocessing to build a structured dataset, then trained and fine-tuned models to improve prediction accuracy and response relevance.

          Designed conversation flows and implemented natural language processing to interpret user input, and integrated backend APIs for efficient query handling.

